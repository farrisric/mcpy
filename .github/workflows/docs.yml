name: Build and deploy docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Sphinx and theme
        run: |
          python -m pip install --upgrade pip
          pip install sphinx sphinx_rtd_theme==3.0.1 myst_parser==3.0.1

      - name: Build HTML (warnings are errors)
        run: sphinx-build -W --keep-going -b html docs docs/_build/html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  readthedocs:
    # Read the Docs also rebuilds through its own push webhook; this job makes
    # the rebuild explicit, gates it on the docs building cleanly, and covers
    # setups where the webhook is missing. Requires the RTD_TOKEN repository
    # secret (readthedocs.org -> account settings -> API tokens).
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Trigger Read the Docs build
        env:
          RTD_TOKEN: ${{ secrets.RTD_TOKEN }}
        run: |
          if [ -z "$RTD_TOKEN" ]; then
            echo "RTD_TOKEN secret not set; skipping API trigger." \
                 "Read the Docs' own webhook still rebuilds on push."
            exit 0
          fi
          curl --fail-with-body -X POST \
            -H "Authorization: Token $RTD_TOKEN" \
            https://readthedocs.org/api/v3/projects/mc-py/versions/latest/builds/
